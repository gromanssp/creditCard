<div class="columns">
  <div class="column">
    <app-card [firstname]="cardForm.value.firstname" [cardNumber]="cardForm.value.cardNumber" [expiration]="cardForm.value.expiration"></app-card>
  </div>
  <div class="column card">
    <div class="card-content">
      <form [formGroup]="cardForm" (ngSubmit)="onSubmit()">
        <app-input label="Firstname" [control]="cardForm.controls.firstname"></app-input>
        <app-input label="Card Number" [control]="cardForm.controls.cardNumber"></app-input>
        <div class="columns">
          <div class="column">
            <app-input label="Expiration (MM/YY)" [control]="cardForm.controls.expiration"></app-input>
          </div>
          <div class="column">
            <app-input label="Security Code" [control]="cardForm.controls.securityCode"></app-input>
          </div>
        </div>
        <div class="field has-addons">
          <div class="control is-expanded">
            <button class="button is-warning is-dark is-rounded is-fullwidth" type="button" (click)="onResetClick()">RESET</button>
          </div>
          <div class="control is-expanded">
            <button class="button is-primary is-dark is-rounded is-fullwidth" [disabled]="cardForm.invalid" type="submit">SUBMIT</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
